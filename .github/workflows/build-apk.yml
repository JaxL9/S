name: Free APK Build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: JaxL9/TAP-A-Cusor
          path: my-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          cd my-app
          npm install

      - name: Build Android APK
        uses: ni554n/apk-builder-action@v2
        with:
          root-directory: ./my-app
