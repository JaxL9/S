name: Build APK from ZIP
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project
        run: unzip project.zip -d my-app

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Dependencies
        run: |
          cd my-app
          npm install --force

      - name: Build APK
        run: |
          cd my-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: OnSpace-App-APK
          path: my-app/android/app/build/outputs/apk/debug/*.apk
